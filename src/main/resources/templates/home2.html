<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<title>HOME</title>
<style type="text/css">
    
   
    .pagination {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }
    .pagination button {
        margin: 0 5px;
        padding: 5px 10px;
        cursor: pointer;
    }
</style>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        var rowsPerPage = 10;
        var rows = $('tbody tr');
        var rowsCount = rows.length;
        var pageCount = Math.ceil(rowsCount / rowsPerPage);

        for (var i = 0; i < pageCount; i++) {
            $('.pagination').append('<button class="page-link btn btn-outline-info">' + (i + 1) + '</button>');
        }

        rows.hide();
        rows.slice(0, rowsPerPage).show();

        $('.pagination button').first().addClass('active');

        $('.pagination button').on('click', function() {
            var pageNum = $(this).text();
            var start = (pageNum - 1) * rowsPerPage;
            var end = start + rowsPerPage;

            rows.hide();
            rows.slice(start, end).show();

            $('.pagination button').removeClass('active');
            $(this).addClass('active');
        });
    });
</script>

</head>
<body>
    <main style="text-align: center; width: 500px; margin: 0 auto;"> <!-- 너비를 테이블과 일치시키고 중앙 정렬 -->
        <h1>Store List</h1> 
        <table class="table">
            <thead>
                <tr>
                     
                    <th>StoreName</th>
                    <th>AreaZ</th>
                    <th>Category</th> 
                </tr>
            </thead>
            <tbody style="background-color: white;">
                <tr th:each="map : ${list}"> 
                    <td><button type="button"class="btn btn-outline-light text-dark" th:onclick="'/detail=' + ${map.StoreNum}" th:text="${map.StoreName}"></button></td>
                    <td th:text="${map.AreaZ}"></td>
                    <td th:text="${map.Category}"></td> 
                </tr>
            </tbody>
        </table>
        <div class="pagination"></div>
    </main>
</body>
</html>
